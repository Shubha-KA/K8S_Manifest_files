apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: recruitment-rs
  namespace: shubha-ns
  labels:
    app: recruitment
spec:
  replicas: 4
  selector:
    matchLabels:
      app: recruitment-app
  template:
    metadata:
      labels:
        app: recruitment-app
    spec:
      containers:
        - name: recruitment-container
          image: shubha20/recruitment-app-project_app:latest
          ports:
            - containerPort: 3000