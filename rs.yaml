apiVersion: apps/v1
kind: ReplicaSet
metadata:
  name: ey-cart-rs 
  namespace: shubha-ns
  labels:
    app: cart
spec: #It defines the behaviour of the ReplicaSet
  replicas: 3
  selector: #It defines how the ReplicaSet finds which Pods to manage
    matchLabels:
      app: web
  template: #It contains pod definition
    metadata:
      labels:
        app: web
    spec: # It contains container definition
      containers: 
        - name: ey-cart-container
          image: muralisocial123/flipkart-app-web:v1.1.0
          ports:
            - containerPort: 3000

  